<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/form.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <title>Form Izin</title>
</head>

<body>
    <div class="container">
  <form id="form" class="dtainpt">
    <div class="judul">
      <h2>Form Izin</h2>
    </div>

  
    <!-- Name -->
    <div class="form-group">
      <label for="nme">Nama</label>
      <input type="number" id="nme" name="employee_id" placeholder="Masukkan ID">
    </div>

    <div class="fg-1">
     <!-- Estimasi -->
    <div class="form-group">
      <label for="kendaraan_id">Kendaraan</label>
      <input type="number" id="kendaraan" name="kendaraan_id">
    </div>

    <div class="form-group">
      <label for="tujuan">Tujuan List</label>
      <input type="text" id="tujuan" name="tujuan_list">
    </div>

    <!-- Tombol -->
    <div class="butadd">
      <button type="submit" class="tmbh">Add</button>
      <button type="button" class="cnsl">Cancel</button>
    </div>
  </form>
</div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <p id="modal-message"></p>
            <button id="close-modal">Tutup</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="../logic/kendaraanHand.js"></script>
</body>

</html>
